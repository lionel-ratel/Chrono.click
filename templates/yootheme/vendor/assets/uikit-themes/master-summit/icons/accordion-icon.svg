    <style>
        .uk-accordion-icon svg > [class*='line-'],
        .uk-accordion-icon svg > [class*='background-'] {
            transition: 0.2s ease-out;
            transition-property: transform, opacity;
            transform-origin: center;
        }
        [aria-expanded="true"] .uk-accordion-icon svg > .line-1 {
            transform: rotate(-45deg);
            opacity: 0;
        }
        [aria-expanded="true"] .uk-accordion-icon svg > .line-2 { transform: rotate(90deg); }

        .uk-accordion-icon svg > .background-1 { opacity: 0; }
        [aria-expanded="true"] .uk-accordion-icon svg > .background-1 { opacity: 1; }
        .uk-accordion-icon svg > .background-2 { opacity: 1; }
        [aria-expanded="true"] .uk-accordion-icon svg > .background-2 { opacity: 0; }
    </style>
