<svg width="14" height="14" viewBox="0 0 14 14" xmlns="http://www.w3.org/2000/svg">
    <style>
        .uk-accordion-icon svg > [class*='line-'] {
            transition: 0.2s ease-out;
            transition-property: transform, opacity;
            transform-origin: center;
        }

        [aria-expanded="true"] .uk-accordion-icon svg > .line-1 {
            transform: rotate(-45deg);
            opacity: 0;
        }
        
        [aria-expanded="true"] .uk-accordion-icon svg > .line-2 { transform: rotate(90deg); }
    </style>
    <line class="line-1" fill="none" stroke="#000" stroke-linecap="round" stroke-width="1.5" x1=".75" y1="7" x2="13.25" y2="7" />
    <line class="line-2" fill="none" stroke="#000" stroke-linecap="round" stroke-width="1.5" x1="7" y1=".75" x2="7" y2="13.25" />
</svg>
