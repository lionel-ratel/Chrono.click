<svg width="18" height="9" viewBox="0 0 18 9" xmlns="http://www.w3.org/2000/svg">
    <style>
        .uk-accordion-icon svg > .chevron {
            transition: transform 0.3s ease-out;
            transform-origin: center;
        }

        [aria-expanded="true"] .uk-accordion-icon svg > .chevron { transform: rotateX(180deg); }
    </style>
    <polyline class="chevron" fill="none" stroke="#000" stroke-width="1.4" points="17 1 9 8 1 1" />
</svg>
